openapi: 3.1.0
info:
  title: Smart Campus AI Vision API
  description: API hợp đồng giữa Core Business (Consumer) và AI Vision (Provider) thuộc môn học FIT4110 - Lab 02.
  version: 1.0.0
  contact:
    name: Luong Vu
    email: luonganhvu.12a5.tnd@gmail.com

servers:
  - url: http://localhost:4010
    description: Prism Mock Server dùng cho môi trường Lab 02

tags:
  - name: Face Management
    description: Các API liên quan đến xử lý và so khớp khuôn mặt
  - name: Detection Analysis
    description: Các API phân tích và truy vấn thực thể nhận diện
  - name: System Health
    description: Kiểm tra trạng thái hệ thống

paths:
  /vision/face-match:
    post:
      tags:
        - Face Management
      summary: Yêu cầu so khớp khuôn mặt từ ảnh
      description: Gửi tham chiếu ảnh để AI Vision phân tích đặc trưng và so khớp với database nhân sự.
      operationId: matchFace
      parameters:
        - name: X-Correlation-ID
          in: header
          required: true
          description: Mã vết cuộc gọi duy nhất để phục vụ trace log và chống trùng lặp request.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FaceMatchRequest'
      responses:
        '200':
          description: So khớp hoàn tất (bao gồm cả trường hợp khớp thành công hoặc thất bại)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaceMatchResponse'
        '400':
          description: Yêu cầu không hợp lệ (Sai định dạng, thiếu Header bắt buộc)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '422':
          description: Không thể xử lý dữ liệu (Ảnh mờ, không tìm thấy khuôn mặt trong ảnh)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /vision/detections/{detectionId}:
    get:
      tags:
        - Detection Analysis
      summary: Lấy thông tin chi tiết của một lượt nhận diện
      description: Trả về kết quả phân tích đa hình (Khuôn mặt hoặc Biển số xe) dựa trên ID.
      operationId: getDetectionById
      parameters:
        - name: detectionId
          in: path
          required: true
          description: Mã ID của lượt nhận diện cần truy vấn
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lấy dữ liệu chi tiết thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionResult'
        '404':
          description: Không tìm thấy ID lượt nhận diện
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /vision/results/recent:
    get:
      tags:
        - Detection Analysis
      summary: Lấy danh sách các kết quả nhận diện gần đây
      description: Phục vụ cho dashboard hiển thị log thời gian thực của Core Business.
      operationId: getRecentDetections
      responses:
        '200':
          description: Trả về mảng danh sách kết quả gần đây
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DetectionResult'

  /health:
    get:
      tags:
        - System Health
      summary: Kiểm tra trạng thái hoạt động của hệ thống
      description: Endpoint công khai giúp kiểm tra xem service AI Vision còn sống hay không.
      operationId: getHealthStatus
      responses:
        '200':
          description: Hệ thống AI Vision hoạt động bình thường
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP
                  timestamp:
                    type: string
                    format: date-time

components:
  schemas:
    FaceMatchRequest:
      type: object
      required:
        - traceId
        - imageRef
      properties:
        traceId:
          type: string
          format: uuid
          example: "9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d"
        imageRef:
          type: string
          format: uri
          example: "https://storage.smartcampus.edu.vn/frames/cam_01_20260518.jpg"

    FaceMatchResponse:
      type: object
      required:
        - traceId
        - matched
        - confidence
        - modelVersion
        - timestamp
        - personId
      properties:
        traceId:
          type: string
          format: uuid
          example: "9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d"
        matched:
          type: boolean
          example: true
        confidence:
          type: number
          format: float
          example: 0.94
        modelVersion:
          type: string
          example: "facenet-v3.2"
        timestamp:
          type: string
          format: date-time
          example: "2026-05-18T13:15:30Z"
        personId:
          type: [string, "null"]
          description: Mã số nhân sự nếu khớp thành công. Trả về null nếu không khớp.
          example: "SV11708"

    DetectionResult:
      type: object
      required:
        - detectionId
        - detectionType
        - timestamp
      properties:
        detectionId:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d"
        detectionType:
          type: string
          enum: [face, license_plate]
          example: "face"
        timestamp:
          type: string
          format: date-time
          example: "2026-05-18T13:15:30Z"
      discriminator:
        propertyName: detectionType
        mapping:
          face: '#/components/schemas/FaceDetectionPayload'
          license_plate: '#/components/schemas/PlateDetectionPayload'

    FaceDetectionPayload:
      allOf:
        - $ref: '#/components/schemas/DetectionResult'
        - type: object
          properties:
            faceAttributes:
              type: object
              properties:
                gender:
                  type: string
                  example: "Male"
                age:
                  type: integer
                  example: 20

    PlateDetectionPayload:
      allOf:
        - $ref: '#/components/schemas/DetectionResult'
        - type: object
          properties:
            plateAttributes:
              type: object
              properties:
                plateNumber:
                  type: string
                  example: "29A-12345"
                vehicleColor:
                  type: string
                  example: "Red"

    ProblemDetails:
      type: object
      required:
        - type
        - title
        - status
        - detail
      properties:
        type:
          type: string
          format: uri
          example: "https://api.smartcampus.edu.vn/probs/unprocessable-content"
        title:
          type: string
          example: "Unprocessable Content"
        status:
          type: integer
          example: 422
        detail:
          type: string
          example: "The provided image is too blurry to extract face features."
        instance:
          type: string
          format: uri
          example: "https://api.smartcampus.edu.vn/vision/face-match"